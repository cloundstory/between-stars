<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#04060d">
<title>ห้วงดาว · Dashboard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04060d; --ink:#eef2fb; --muted:#7e8aa6; --faint:#4a5470;
    --gold:#f3c97a; --gold-dim:rgba(243,201,122,.13); --line:rgba(255,255,255,.07);
    --panel:rgba(8,11,20,.72); --blue:#7fb0ff;
    --eng:"Space Grotesk","Noto Sans Thai",sans-serif;
    --th:"Noto Sans Thai","Space Grotesk",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--th);-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
  a{color:inherit;text-decoration:none}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:30px 24px 90px}

  .back{display:inline-flex;align-items:center;gap:7px;font-family:var(--eng);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);transition:.2s}
  .back:hover{color:var(--gold)}

  /* hero header */
  .head{text-align:center;padding:42px 0 8px}
  .head .over{font-family:var(--eng);font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint);margin-bottom:18px}
  .head h1{font-family:var(--th);font-weight:300;font-size:clamp(34px,6vw,58px);line-height:1;letter-spacing:.02em}
  .head .en{font-family:var(--eng);font-weight:300;letter-spacing:.4em;text-transform:uppercase;font-size:clamp(9px,1.4vw,12px);color:var(--muted);margin-top:18px;padding-left:.4em}

  /* toolbar */
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin:34px 0 8px}
  .who{font-family:var(--th);font-size:12px;color:var(--muted)}
  .who .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);margin-right:7px;vertical-align:1px}
  .who b{color:var(--gold);font-weight:500}
  .tbtns{display:flex;gap:8px}
  .btn{font-family:var(--eng);font-size:10px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;border-radius:9px;padding:9px 15px;transition:.2s}
  .btn-g{background:var(--gold-dim);border:1px solid rgba(243,201,122,.3);color:var(--gold)}
  .btn-g:hover{background:rgba(243,201,122,.2);border-color:var(--gold)}
  .btn-x{background:none;border:1px solid var(--line);color:var(--faint)}
  .btn-x:hover{color:var(--muted);border-color:var(--muted)}

  /* section label */
  .slabel{display:flex;align-items:center;gap:14px;margin:38px 0 18px}
  .slabel span{font-family:var(--eng);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);white-space:nowrap}
  .slabel .th{font-family:var(--th);color:var(--muted);letter-spacing:0;text-transform:none;font-size:13px}
  .slabel:before,.slabel:after{content:"";height:1px;background:linear-gradient(90deg,transparent,var(--line))}
  .slabel:before{flex:0 0 0}
  .slabel:after{flex:1;background:linear-gradient(90deg,var(--line),transparent)}

  /* stat grid */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:20px 18px;overflow:hidden;transition:.3s cubic-bezier(.22,.68,0,1.1)}
  .stat:hover{transform:translateY(-4px);border-color:rgba(243,201,122,.28)}
  .stat .halo{position:absolute;right:-30px;top:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(243,201,122,.1),transparent 70%);pointer-events:none}
  .stat b{display:block;font-family:var(--eng);font-weight:300;font-size:clamp(28px,4.5vw,40px);color:#fff;line-height:1;letter-spacing:-.01em}
  .stat .lbl{font-family:var(--th);font-size:12.5px;color:var(--muted);margin-top:11px}
  .stat .sub2{font-family:var(--eng);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:4px}

  /* panel card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 22px 24px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}
  .ctitle{font-family:var(--eng);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.9;margin-bottom:2px}
  .csub{font-family:var(--th);font-size:12px;color:var(--faint);margin-bottom:18px}

  /* chart */
  .chart{position:relative;height:180px;margin-top:8px}
  .chart .grid-l{position:absolute;left:0;right:0;height:1px;background:var(--line)}
  .chart .ymax{position:absolute;right:0;top:-8px;font-family:var(--eng);font-size:9px;color:var(--faint)}
  .bars{position:absolute;inset:0;display:flex;align-items:flex-end;gap:5px;padding-top:14px}
  .bar{flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;cursor:default}
  .bar .pair{display:flex;align-items:flex-end;justify-content:center;gap:2px;width:100%;height:100%}
  .bar .c{width:42%;max-width:11px;min-height:2px;border-radius:3px 3px 0 0;transition:height .5s cubic-bezier(.22,.68,0,1.1)}
  .bar .c.v{background:linear-gradient(180deg,#f6d79a,#cf9a44)}
  .bar .c.u{background:linear-gradient(180deg,#9cc3ff,#4a6fb0)}
  .bar:hover .c.v{background:linear-gradient(180deg,#ffe7b0,#e0a94e)}
  .bar .d{font-family:var(--eng);font-size:8px;color:var(--faint);white-space:nowrap}
  .legend{display:flex;gap:18px;margin-top:16px;font-family:var(--th);font-size:11.5px;color:var(--muted)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:-1px}

  /* ranked list with proportional bar */
  .rows{display:flex;flex-direction:column}
  .lr{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.045)}
  .lr:last-child{border-bottom:none}
  .lr .meter{position:absolute;left:0;bottom:0;height:2px;background:linear-gradient(90deg,rgba(243,201,122,.55),rgba(243,201,122,.05));border-radius:2px;transition:width .6s ease}
  .lr .k{display:flex;align-items:center;gap:11px;min-width:0}
  .lr .rk{font-family:var(--eng);font-size:10px;color:var(--faint);width:16px;flex:0 0 16px;text-align:right}
  .lr .nm{font-family:var(--th);font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lr .vv{font-family:var(--eng);font-size:14px;font-weight:500;color:var(--gold);white-space:nowrap}
  .empty{font-family:var(--th);font-size:13px;color:var(--faint);padding:14px 0}
  .lr.zero{opacity:.5}
  .lr.zero .nm{color:var(--faint)}
  .lr.zero .vv{color:var(--faint);font-weight:400}
  .lr.zero .rk{color:rgba(255,255,255,.14)}

  /* centered states */
  .center{min-height:54vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px}
  .center .muted{font-family:var(--th);color:var(--muted);font-size:14px;line-height:1.85}
  .inrow{display:flex;gap:8px;width:100%;max-width:340px;margin-top:4px}
  .inrow input{flex:1;background:rgba(4,6,13,.7);border:1px solid var(--line);color:var(--ink);font-family:var(--th);font-size:14px;padding:12px 14px;border-radius:11px}
  .inrow input:focus{outline:none;border-color:rgba(243,201,122,.5)}
  .send{background:linear-gradient(135deg,#f3c97a,#e0a94e);border:none;color:#1a1408;font-family:var(--th);font-weight:600;font-size:14px;padding:12px 20px;border-radius:11px;cursor:pointer}
  .send:hover{filter:brightness(1.06)}
  .msg{font-family:var(--th);font-size:13px;color:var(--muted);min-height:18px;line-height:1.7;max-width:340px}
  /* orbit spinner */
  .orbit{width:52px;height:52px;position:relative}
  .orbit:before{content:"";position:absolute;inset:0;border-radius:50%;border:1px solid var(--line)}
  .orbit:after{content:"";position:absolute;top:-3px;left:50%;width:7px;height:7px;margin-left:-3px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);transform-origin:3.5px 29px;animation:orb 1.5s linear infinite}
  @keyframes orb{to{transform:rotate(360deg)}}

  .foot{text-align:center;margin-top:60px;font-family:var(--eng);font-size:9px;letter-spacing:.14em;color:var(--faint);line-height:1.9}

  /* aurora glow behind header */
  #aurora{position:fixed;left:50%;top:-160px;width:min(120vw,1100px);height:520px;transform:translateX(-50%);z-index:0;pointer-events:none;
    background:radial-gradient(50% 60% at 50% 40%,rgba(243,201,122,.10),transparent 70%),radial-gradient(40% 50% at 64% 30%,rgba(127,176,255,.08),transparent 72%);filter:blur(8px)}

  /* entrance */
  @keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .rise{animation:riseIn .6s cubic-bezier(.22,.68,0,1.1) both}
  /* grow-in via transform — final size stays in inline style, so it's correct even if anim never paints */
  @keyframes growV{from{transform:scaleY(.001)}}
  @keyframes growH{from{transform:scaleX(0)}}
  .c.anim{transform-origin:bottom center;animation:growV .6s cubic-bezier(.22,.68,0,1.1) both}
  .meter.anim{transform-origin:left center;animation:growH .7s cubic-bezier(.22,.68,0,1.1) both}
  .seg span.anim{transform-origin:left center;animation:growH .8s cubic-bezier(.22,.68,0,1.1) both}

  /* floating chart tooltip */
  #tip{position:fixed;z-index:9;pointer-events:none;opacity:0;transform:translate(-50%,-100%);transition:opacity .15s ease;
    background:rgba(10,13,22,.96);border:1px solid rgba(243,201,122,.3);border-radius:10px;padding:8px 11px;
    font-family:var(--th);font-size:12px;color:var(--ink);white-space:nowrap;box-shadow:0 8px 26px rgba(0,0,0,.5)}
  #tip .t-d{font-family:var(--eng);font-size:9px;letter-spacing:.1em;color:var(--gold);margin-bottom:3px}
  #tip .t-v i{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:5px;vertical-align:0}

  /* segmented device bar */
  .seg{display:flex;height:12px;border-radius:7px;overflow:hidden;margin-bottom:14px;background:rgba(255,255,255,.04)}
  .seg span{height:100%;transition:width .7s cubic-bezier(.22,.68,0,1.1)}
  .seglg{display:flex;flex-wrap:wrap;gap:7px 16px;margin-bottom:16px;font-family:var(--th);font-size:12px;color:var(--muted)}
  .seglg i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:-1px}
  .seglg b{color:var(--ink);font-family:var(--eng);font-weight:500;font-size:12px;margin-left:5px}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="aurora"></div>
<div id="tip"></div>
<div class="wrap">
  <a class="back" href="index.html">← ห้วงดาว</a>
  <header class="head">
    <div class="over">Private · Founder Dashboard</div>
    <h1>สถิติห้วงดาว</h1>
    <div class="en">Between Stars · Analytics</div>
  </header>
  <div id="view"><div class="center"><div class="orbit"></div><div class="muted">กำลังตรวจสอบสิทธิ์…</div></div></div>
  <div class="foot">ห้วงดาว · BETWEEN STARS · ข้อมูลนิรนาม · ไม่มีคุกกี้</div>
</div>

<script>
// starfield (เหมือนหน้าแรก)
(function(){
  var c=document.getElementById('stars'),x=c.getContext('2d'),st=[],W,H;
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var dens=matchMedia('(max-width:860px),(pointer:coarse)').matches?16000:9000;
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;st=[];var n=Math.round(W*H/dens);
    for(var i=0;i<n;i++)st.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,a:Math.random()*.6+.15,p:Math.random()*6.28});}
  rs();addEventListener('resize',rs);
  function draw(t){x.clearRect(0,0,W,H);
    for(var i=0;i<st.length;i++){var s=st[i],tw=s.a*(.65+.35*Math.sin(t*1.4+s.p));
      x.beginPath();x.arc(s.x,s.y,s.r,0,6.2832);x.fillStyle='rgba(220,228,255,'+tw+')';x.fill();}}
  if(reduce){draw(0);addEventListener('resize',function(){draw(0);});return;}
  var t=0;function loop(){if(document.hidden)return;t+=.016;draw(t);requestAnimationFrame(loop);}
  loop();document.addEventListener('visibilitychange',function(){if(!document.hidden)loop();});
})();
</script>

const FOUNDER = 'cloundstory@gmail.com';
const view = document.getElementById('view');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const nf  = n => (n==null?'–':Number(n).toLocaleString('en-US'));
const reduceMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;
const fmtDur = sec => { if(sec==null) return '–'; sec=Math.round(sec); if(sec<60) return sec+'<small style="font-size:.5em;color:var(--muted)"> วิ</small>'; const m=Math.floor(sec/60),s=sec%60; return m+'<small style="font-size:.5em;color:var(--muted)"> น</small>'+(s?' '+s+'<small style="font-size:.5em;color:var(--muted)"> วิ</small>':''); };

// nicer labels for events / paths — key order = how unused (0-count) features are ordered on the card
const EV = { mood_save:'บันทึกห้วงใจ', release:'ปล่อยวาง (หลุมดำ)', letter_cast:'ฝากคำฝาก', letter_reply:'ตอบคำฝาก', letter_catch:'รับคำฝาก (จับดาวตก)', star_echo:'เสียงดาววันนี้',
  chronos_open:'เปิด Chronos Lens', capture:'บันทึกภาพ', share:'แชร์', golden_save:'Golden Record', resonance:'เสียงสะท้อน', lightecho:'แสงจากวันนั้น' };
const PG = { '/':'หน้าแรก','/index.html':'หน้าแรก','/solar-system.html':'ระบบสุริยะ','/light-echo.html':'แสงจากวันนั้น','/starmap.html':'แผนที่ดาว','/space-history.html':'70 ปีอวกาศ','/credits.html':'เครดิต','/privacy.html':'ความเป็นส่วนตัว','/dashboard.html':'แดชบอร์ด' };
const niceEvent = n => EV[n] || n;
const nicePath  = p => PG[p] || p;

// Events card — ALWAYS list every known feature, even at 0 (so "exists but unused" ≠ "not tracked yet").
// Used features (count>0) rank by count; unused show 0, dimmed, in EV order.
function eventsCard(topEvents){
  const counts = {};
  (topEvents||[]).forEach(e=>{ counts[e.name] = e.count; });
  const names = [...new Set([...Object.keys(EV), ...Object.keys(counts)])]; // known + any new event from data
  const ord = n => { const i = Object.keys(EV).indexOf(n); return i<0 ? 999 : i; };
  const items = names.map(n=>({ name:n, count:counts[n]||0 }))
    .sort((a,b)=> (b.count - a.count) || (ord(a.name) - ord(b.name)));
  const max = Math.max(1, ...items.map(it=>it.count||0));
  let rank = 0;
  return `<div class="rows">` + items.map((it,i)=>{
    const zero = !it.count;
    const w = Math.round(((it.count||0)/max)*100);
    if(!zero) rank++;
    const ac = reduceMotion ? '' : ' anim';
    const dl = reduceMotion ? '' : `;animation-delay:${i*26}ms`;
    return `<div class="lr${zero?' zero':''}">${zero?'':`<div class="meter${ac}" style="width:${w}%${dl}"></div>`}
      <div class="k"><span class="rk">${zero?'·':rank}</span><span class="nm">${esc(niceEvent(it.name))}</span></div>
      <span class="vv">${nf(it.count)}</span></div>`;
  }).join('') + `</div>`;
}

let sb;
try{
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  sb = createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, flowType:'pkce' } });
}catch(e){ view.innerHTML = `<div class="center"><div class="muted">โหลดระบบไม่สำเร็จ ลองรีเฟรชอีกครั้ง</div></div>`; throw e; }

function loginView(prefill=''){
  view.innerHTML = `<div class="center">
    <div class="muted">หน้านี้สำหรับผู้ก่อตั้งเท่านั้น<br>ป้อนอีเมลเพื่อรับลิงก์เข้าระบบ</div>
    <div class="inrow"><input id="em" type="email" placeholder="your@email.com" value="${esc(prefill)}" autocomplete="email"><button class="send" id="go">ส่งลิงก์</button></div>

  };
  document.getElementById('go').onclick = submit;
  document.getElementById('em').addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });

function deniedView(email){

    <div class="muted">บัญชี <b style="color:var(--gold)">${esc(email)}</b><br>ไม่มีสิทธิ์เข้าถึงหน้านี้</div>
    <button class="btn btn-x" id="out">ออกจากระบบ</button>
  </div>`;
  document.getElementById('out').onclick = async ()=>{ await sb.auth.signOut(); loginView(); };

function statCard(val,lbl,sub,raw){
  const num = (typeof raw==='number' && isFinite(raw) && !reduceMotion);
  const inner = num ? `<b data-count="${raw}">${val}</b>` : `<b>${val}</b>`;
  return `<div class="stat"><div class="halo"></div>${inner}<div class="lbl">${lbl}</div>${sub?`<div class="sub2">${sub}</div>`:''}</div>`;
}

function bars(byDay){
  const days = (byDay||[]).slice(-21);
  if(!days.length) return '<div class="empty">ยังไม่มีข้อมูล</div>';
  const max = Math.max(1, ...days.map(d=>d.views));
  const ncols = days.length;
  const lblStep = Math.ceil(ncols/8);
  const cols = days.map((d,i)=>{
    const hv = Math.max(2,(d.views/max)*100), hu = Math.max(0,((d.visitors||0)/max)*100);
    const dd = d.day ? d.day.slice(8)+'/'+d.day.slice(5,7) : '';
    const show = (i%lblStep===0)||i===ncols-1;
    const ac = reduceMotion ? '' : ' anim';
    const dl = reduceMotion ? '' : `;animation-delay:${i*7}ms`;
    const tip = `<div class='t-d'>${esc(d.day)}</div><div class='t-v'><i style='background:#f3c97a'></i>${nf(d.views)} เข้าชม</div><div class='t-v'><i style='background:#7fb0ff'></i>${nf(d.visitors)} คน</div>`;
    return `<div class="bar" data-tip="${tip}">
      <div class="pair"><div class="c v${ac}" style="height:${hv}%${dl}"></div><div class="c u${ac}" style="height:${hu}%${dl}"></div></div>
      <div class="d">${show?esc(dd):''}</div></div>`;
  }).join('');
  return `<div class="chart">
      <div class="grid-l" style="top:0"></div><div class="grid-l" style="top:50%"></div><div class="grid-l" style="bottom:18px"></div>
      <div class="ymax">${nf(max)}</div>
      <div class="bars">${cols}</div>
    </div>
    <div class="legend"><span><i style="background:linear-gradient(180deg,#f6d79a,#cf9a44)"></i>การเข้าชม</span><span><i style="background:linear-gradient(180deg,#9cc3ff,#4a6fb0)"></i>คนไม่ซ้ำ</span></div>`;
}

function ranked(items, kKey, vKey, labeler){
  vKey = vKey||'views';
  if(!items || !items.length) return '<div class="empty">ยังไม่มีข้อมูล</div>';
  const max = Math.max(1, ...items.map(it=>it[vKey]||0));
  return `<div class="rows">` + items.map((it,i)=>{
    const w = Math.round(((it[vKey]||0)/max)*100);
    const name = labeler ? labeler(it[kKey]) : it[kKey];
    const ac = reduceMotion ? '' : ' anim';
    const dl = reduceMotion ? '' : `;animation-delay:${i*26}ms`;
    return `<div class="lr"><div class="meter${ac}" style="width:${w}%${dl}"></div>
      <div class="k"><span class="rk">${i+1}</span><span class="nm">${esc(name)}</span></div>
      <span class="vv">${nf(it[vKey])}</span></div>`;
  }).join('') + `</div>`;
}

const DEV_COL = { mobile:['#f6d79a','#cf9a44','มือถือ'], desktop:['#9cc3ff','#4a6fb0','คอม'], tablet:['#b9a6d6','#7a6aa0','แท็บเล็ต'] };
function deviceSplit(items){
  if(!items || !items.length) return '';
  const total = items.reduce((a,b)=>a+(b.views||0),0) || 1;
  const segs = items.map(it=>{ const c = DEV_COL[it.source] || ['#7e8aa6','#4a5470', it.source]; return { pct:(it.views||0)/total*100, c }; });
  const seg = segs.map(s=>{ const bg = `background:linear-gradient(90deg,${s.c[0]},${s.c[1]})`;
    return `<span class="${reduceMotion?'':'anim'}" style="${bg};width:${s.pct.toFixed(1)}%"></span>`; }).join('');
  const lg = segs.map(s=>`<span><i style="background:${s.c[0]}"></i>${esc(s.c[2])}<b>${Math.round(s.pct)}%</b></span>`).join('');
  return `<div class="seg">${seg}</div><div class="seglg">${lg}</div>`;
}

function afterRender(){
  // entrance stagger
  if(!reduceMotion){ [...view.children].forEach((el,i)=>{ el.classList.add('rise'); el.style.animationDelay = Math.min(i*55,520)+'ms'; }); }
  // count up — final value is already in the DOM; only animate when visible (with a guaranteed fallback)
  if(!reduceMotion && !document.hidden){
    document.querySelectorAll('b[data-count]').forEach(el=>{
      const final = el.textContent, target = +el.dataset.count, dur = 950, t0 = performance.now();
      el.textContent = '0';
      const tick = now=>{ const e = Math.min(1,(now-t0)/dur), k = 1-Math.pow(1-e,3);
        el.textContent = Math.round(target*k).toLocaleString('en-US'); if(e<1) requestAnimationFrame(tick); };
      requestAnimationFrame(tick);
      setTimeout(()=>{ el.textContent = final; }, dur+200);   // ensure final even if rAF is throttled
    });
  }
  // chart tooltip
  const tip = document.getElementById('tip');
  document.querySelectorAll('.bar[data-tip]').forEach(b=>{
    b.addEventListener('mouseenter',()=>{ tip.innerHTML = b.dataset.tip; tip.style.opacity='1'; });
    b.addEventListener('mousemove',e=>{ tip.style.left = e.clientX+'px'; tip.style.top = (e.clientY-14)+'px'; });
    b.addEventListener('mouseleave',()=>{ tip.style.opacity='0'; });
  });
}

function statsView(s, email){
  view.innerHTML = `
    <div class="toolbar">
      <div class="who"><span class="dot"></span>เข้าสู่ระบบ · <b>${esc(email)}</b></div>
      <div class="tbtns"><button class="btn btn-g" id="refresh">รีเฟรช</button><button class="btn btn-x" id="out">ออกจากระบบ</button></div>
    </div>

    <div class="slabel"><span>Overview</span><span class="th">ภาพรวม</span></div>
    <div class="stats">
      ${statCard(nf(s.total_views),'การเข้าชมรวม',null,s.total_views)}
      ${statCard(nf(s.total_visitors),'ผู้เข้าชม','ไม่ซ้ำ',s.total_visitors)}
      ${statCard(nf(s.views_today),'วันนี้','เวลาไทย',s.views_today)}
      ${statCard(nf(s.views_7d),'7 วันล่าสุด', nf(s.visitors_7d)+' คน',s.views_7d)}
    </div>

    <div class="slabel"><span>Engagement</span><span class="th">การมีส่วนร่วม</span></div>
    <div class="stats">
      ${statCard(nf(s.new_visitors),'ผู้เข้าชมใหม่',null,s.new_visitors)}
      ${statCard(nf(s.returning_visitors),'กลับมาเล่นซ้ำ',null,s.returning_visitors)}
      ${statCard(fmtDur(s.avg_dwell),'เวลาเฉลี่ย/หน้า')}
      ${statCard(fmtDur(s.median_dwell),'มัธยฐาน/หน้า')}
    </div>

    <div class="slabel"><span>Last 21 days</span><span class="th">รายวัน</span></div>
    <div class="card">${bars(s.by_day)}</div>

    <div class="slabel"><span>Engagement detail</span></div>
    <div class="grid2">
      <div class="card"><div class="ctitle">Events</div><div class="csub">การใช้ฟีเจอร์ · ตัวที่จาง = ยังไม่มีคนใช้</div>${eventsCard(s.top_events)}</div>
      <div class="card"><div class="ctitle">Pages</div><div class="csub">หน้ายอดนิยม</div>${ranked(s.by_path,'path','views',nicePath)}</div>
    </div>

    <div class="slabel"><span>Audience</span><span class="th">ผู้ชม</span></div>
    <div class="grid2">
      <div class="card"><div class="ctitle">Devices</div><div class="csub">อุปกรณ์</div>${deviceSplit(s.by_device)}${ranked(s.by_device,'source','views')}</div>
      <div class="card"><div class="ctitle">Language</div><div class="csub">ภาษา</div>${ranked(s.by_lang,'source','views')}</div>
    </div>

    <div class="slabel"><span>Referrers</span><span class="th">ที่มา</span></div>
    <div class="card">${ranked(s.by_ref,'source','views')}</div>
  `;
  document.getElementById('out').onclick = async ()=>{ await sb.auth.signOut(); loginView(); };
  document.getElementById('refresh').onclick = ()=> load();
  afterRender();
}

async function load(){
  view.innerHTML = '<div class="center"><div class="orbit"></div></div>';
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ loginView(); return; }
  const email = session.user.email || '';
  if(email !== FOUNDER){ deniedView(email); return; }
  const { data, error } = await sb.rpc('founder_stats');
  if(error){ view.innerHTML = `<div class="center"><div class="muted">ดึงข้อมูลไม่สำเร็จ<br><span style="opacity:.6">${esc(error.message)}</span><br><span style="opacity:.5;font-size:12px">(ตั้งค่า RPC ใน Supabase แล้วหรือยัง?)</span></div><button class="btn btn-x" id="out">ออกจากระบบ</button></div>`;
    const o=document.getElementById('out'); if(o) o.onclick=async()=>{await sb.auth.signOut();loginView();}; return; }
  statsView(data, email);
}

sb.auth.onAuthStateChange((ev)=>{ if(ev==='SIGNED_IN'||ev==='SIGNED_OUT'||ev==='INITIAL_SESSION') load(); });
load();
</script>
