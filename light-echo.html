<style>
  :root{--bg:#04060d;--ink:#eef2fb;--muted:#7e8aa6;--faint:#4a5470;--gold:#f3c97a;--line:rgba(255,255,255,.07);

  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--th);-webkit-font-smoothing:antialiased;overflow-x:hidden}

  .en{font-family:var(--eng);font-weight:300;letter-spacing:.42em;text-transform:uppercase;font-size:12px;color:var(--muted);padding-left:.42em}
  .lead{font-size:14.5px;color:rgba(238,242,251,.6);line-height:1.85;margin:24px auto 0;max-width:460px}
  /* input */
  .ask{margin:38px auto 0;display:flex;flex-direction:column;align-items:center;gap:14px}
  .ask label{font-family:var(--th);font-size:13px;color:rgba(238,242,251,.55)}
  .ask input[type=date]{font-family:var(--eng);font-size:16px;background:rgba(255,255,255,.04);color:var(--ink);
    border:1px solid var(--line);border-radius:12px;padding:13px 18px;outline:none;color-scheme:dark;transition:.2s}
  .ask input[type=date]:focus{border-color:rgba(243,201,122,.4)}
  .send{font-family:var(--eng);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#04060d;
    background:var(--gold);border:none;border-radius:22px;padding:13px 30px;cursor:pointer;transition:.25s;font-weight:600}
  .send:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .warn{font-family:var(--th);font-size:12.5px;color:rgba(255,140,140,.8);min-height:16px}
  /* result */
  .result{margin-top:34px;opacity:0;transform:translateY(14px);transition:opacity 1s ease,transform 1s cubic-bezier(.2,.7,.2,1);pointer-events:none}
  .result.on{opacity:1;transform:none;pointer-events:auto}
  .rcanvas-wrap{position:relative;width:100%;aspect-ratio:4/3;border-radius:20px;overflow:hidden;
    border:1px solid rgba(243,201,122,0.14);background:radial-gradient(140% 100% at 50% 60%,#070b1a,#03040c)}
  #echo{width:100%;height:100%;display:block}
  .rtext{text-align:center;margin-top:26px}
  .rdist{font-family:var(--eng);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

  .rstaren{font-family:var(--eng);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}

  .ractions{display:flex;gap:12px;justify-content:center;margin-top:26px;flex-wrap:wrap}

  {th:'เอปไซลอน เอริดานี',en:'Epsilon Eridani',ly:10.5,d:'ดาวอ่อนวัยที่มีจานฝุ่นและอาจมีดาวเคราะห์'},
  {th:'ดาวพรอกไซออน',en:'Procyon',ly:11.46,d:'ดาวสว่างในกลุ่มสุนัขเล็ก คู่กับดาวแคระขาว'},
  {th:'เทา เซตี',en:'Tau Ceti',ly:11.9,d:'ดาวคล้ายดวงอาทิตย์ที่สุดดวงหนึ่งในละแวกใกล้เคียง'},
  {th:'ดาวอัลแทร์',en:'Altair',ly:16.7,d:'ดาวสว่างในกลุ่มนกอินทรี หมุนเร็วจนแบนเป็นวงรี'},
  {th:'เดลตา พาโวนิส',en:'Delta Pavonis',ly:19.9,d:'ดาวเหลืองอมส้ม คล้ายดวงอาทิตย์ในวัยชรากว่า'},
  {th:'ดาวเวกา',en:'Vega',ly:25.0,d:'ดาวสีน้ำเงินขาว เคยเป็นดาวเหนือเมื่อ 12,000 ปีก่อน'},
  {th:'ดาวโฟมัลฮอต',en:'Fomalhaut',ly:25.1,d:'ดาวเดียวดายแห่งฤดูใบไม้ร่วง ล้อมด้วยวงแหวนฝุ่น'},
  {th:'คารา',en:'Chara',ly:27.4,d:'ดาวเหลืองเงียบสงบในกลุ่มสุนัขล่าเนื้อ'},
  {th:'ดาวพอลลักซ์',en:'Pollux',ly:33.8,d:'ดาวยักษ์สีส้มในกลุ่มคนคู่ มีดาวเคราะห์โคจรรอบ'},
  {th:'ดาวอาร์คตูรุส',en:'Arcturus',ly:36.7,d:'ดาวยักษ์สีส้มเก่าแก่ พุ่งผ่านดาราจักรด้วยความเร็วสูง'},
  {th:'ดาวคาเพลลา',en:'Capella',ly:42.9,d:'แสงเหลืองทองจากดาวยักษ์สี่ดวงที่โคจรพันกัน'},
  {th:'แกมมา เลพอริส',en:'Gamma Leporis',ly:29.3,d:'ดาวคู่สีขาว-เหลืองในกลุ่มกระต่าย'},
  {th:'ดาวแคสเตอร์',en:'Castor',ly:51,d:'ระบบดาวหกดวงที่ดูเป็นจุดเดียวด้วยตาเปล่า'},
  {th:'แอลฟา ลินซิส',en:'Alpha Lyncis',ly:62,d:'ดาวยักษ์สีส้มโดดเดี่ยวในกลุ่มแมวป่า'},
  {th:'ดาวอัลเดบารัน',en:'Aldebaran',ly:65,d:'ดวงตาสีแดงของวัว ดาวยักษ์ที่จ้องมองมายังโลก'},
  {th:'อัปไซลอน แอนดรอเมดา',en:'Upsilon Andromedae',ly:44,d:'ดาวที่มีระบบดาวเคราะห์หลายดวงเป็นแห่งแรก ๆ ที่พบ'},
  {th:'ดาวเรกูลุส',en:'Regulus',ly:79,d:'หัวใจของสิงโต ดาวสีน้ำเงินขาวที่หมุนเร็วมาก'},
  {th:'ดาวอัลกอล',en:'Algol',ly:90,d:'ดาวปีศาจที่หรี่แสงเป็นจังหวะ เพราะมีดาวคู่บังกัน'},
  {th:'ดาวมิซาร์',en:'Mizar',ly:83,d:'ดาวคู่ในหางหมีใหญ่ บททดสอบสายตาของคนโบราณ'},
  {th:'ดาวเมรัก',en:'Merak',ly:79.7,d:'หนึ่งในดาวชี้ทางสู่ดาวเหนือ ในกระบวยใหญ่'},
  {th:'ดาวดูเบ',en:'Dubhe',ly:123,d:'ดาวยักษ์สีส้มที่ปลายกระบวยใหญ่ ชี้ตรงสู่ดาวเหนือ'},
  {th:'ดาวอัลฟาร์ด',en:'Alphard',ly:177,d:'หัวใจอันโดดเดี่ยวของงูไฮดรา สีส้มอมแดง'},
  {th:'ดาวสไปกา',en:'Spica',ly:250,d:'รวงข้าวสีน้ำเงินของหญิงสาว แท้จริงเป็นดาวคู่ร้อนแรง'},
  {th:'ดาวโพลาริส',en:'Polaris',ly:433,d:'ดาวเหนือ เข็มทิศของนักเดินทางมานับพันปี'},
  {th:'ดาวแอนทาเรส',en:'Antares',ly:550,d:'หัวใจสีแดงก่ำของแมงป่อง ยักษ์ใหญ่ที่ใกล้สิ้นอายุ'},
  {th:'ดาวบีเทลจุส',en:'Betelgeuse',ly:642,d:'ยักษ์แดงบนไหล่นายพราน ที่สักวันจะระเบิดเป็นซูเปอร์โนวา'},
  {th:'ดาวไรเจล',en:'Rigel',ly:860,d:'แสงสีน้ำเงินขาวอันทรงพลังที่เท้าของนายพราน'},
  {th:'ดาวเดเนบ',en:'Deneb',ly:2615,d:'ดาวยักษ์ที่ส่องสว่างราวแสนดวงอาทิตย์ ในหางหงส์'}
];
STARS.sort((a,b)=>a.ly-b.ly);
const KMS={day:864e5};
function yearsSince(d){return (Date.now()-d.getTime())/(365.25*864e5);}
function pickStar(ly){
  let best=STARS[0],bd=1e9;
  for(const s of STARS){const diff=Math.abs(s.ly-ly);if(diff<bd){bd=diff;best=s;}}
  return best;
}
function fmt(n){return n.toLocaleString('th-TH',{maximumFractionDigits:1});}

let lastResult=null;
function reveal(d){
  const ly=yearsSince(d);
  const star=pickStar(ly);
  const idx=STARS.indexOf(star);
  const di=new Date(d);
  const dateStr=di.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('rdist').textContent='แสงเดินทางมาแล้ว '+fmt(ly)+' ปีแสง';
  const notReached=ly<STARS[0].ly;
  if(notReached){
    document.getElementById('rstar').innerHTML='<span class="g">✦</span>ยังอยู่ระหว่างทาง';
    document.getElementById('rstaren').textContent='แสงของคุณยังไม่ถึงดาวดวงใด';
    document.getElementById('rdesc').textContent='แสงจาก'+dateStr+' ยังเดินทางอยู่ในความมืดอันกว้างใหญ่ระหว่างดวงดาว ยังอ่อนเยาว์เกินกว่าจะถึงดาวดวงใด — แต่มันไม่เคยหยุด';
    document.getElementById('rnext').textContent='อีก '+fmt(STARS[0].ly-ly)+' ปี มันจะไปถึง '+STARS[0].th+' ('+STARS[0].en+') ดาวที่ใกล้ที่สุด';
  }else{
    document.getElementById('rstar').innerHTML='<span class="g">★</span>'+star.th;
    document.getElementById('rstaren').textContent=star.en+' · '+fmt(star.ly)+' light-years';
    document.getElementById('rdesc').textContent='ในค่ำคืนนี้ แสงจาก'+dateStr+' กำลังส่องถึง'+star.th+'พอดี — '+star.d;
    const next=STARS[idx+1];
    document.getElementById('rnext').textContent=next?('อีก '+fmt(next.ly-ly)+' ปี แสงของคุณจะไปถึง '+next.th):'';
  }
  document.getElementById('rmeta').textContent='จากวันนั้นถึงวันนี้ แสงเดินทาง ≈ '+fmt(ly*9.461)+' ล้านล้านกิโลเมตร';
  document.getElementById('result').classList.add('on');
  lastResult={dateStr,ly,star};
  animateEcho(star,ly);
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}),120);
}

let echoRAF=null;
function animateEcho(star,ly){
  const c=document.getElementById('echo'),x=c.getContext('2d');
  function size(){const r=c.getBoundingClientRect();c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
  size();
  const W=c.getBoundingClientRect().width,H=c.getBoundingClientRect().height;
  const ex=W*0.15,ey=H*0.82;
  const sx=W*0.78,sy=H*0.18;
  const maxR=Math.hypot(sx-ex,sy-ey);
  const pathAngle=Math.atan2(sy-ey,sx-ex);

  // ดาวพื้นหลัง — หลายชั้น (ลึก/ใกล้)
  const bgStars=[];
  for(let i=0;i<280;i++)bgStars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,a:Math.random()*0.55+0.08,p:Math.random()*6.28,sp:0.4+Math.random()*1.8});

  // ดาวที่แสงเดินทางผ่านมาแล้ว
  const passedPos=STARS.filter(s=>s.ly<ly&&s.ly>=STARS[0].ly).slice(-4).map(s=>{
    const t=s.ly/Math.max(ly,0.001);
    return {x:ex+(sx-ex)*t,y:ey+(sy-ey)*t,s,t};
  });

  // particles ไหลตามเส้นทาง
  const parts=[];
  for(let i=0;i<80;i++)parts.push({t:Math.random(),sp:0.00015+Math.random()*0.0005,sz:Math.random()*1.8+0.4,a:Math.random()*0.55+0.15,off:(Math.random()-0.5)*18});

  const t0=performance.now();
  if(echoRAF)cancelAnimationFrame(echoRAF);

  function frame(now){
    const elapsed=now-t0;
    const e=Math.min(1,elapsed/3800);
    const k=1-Math.pow(1-e,3);
    x.clearRect(0,0,W,H);

    // nebula glow พื้นหลัง
    const neb=x.createRadialGradient(W*0.48,H*0.42,0,W*0.48,H*0.42,W*0.65);
    neb.addColorStop(0,'rgba(30,45,100,0.22)');neb.addColorStop(0.5,'rgba(15,22,60,0.10)');neb.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=neb;x.fillRect(0,0,W,H);

    // second nebula — สีฟ้าเขียวอีกชั้น
    const neb2=x.createRadialGradient(W*0.25,H*0.65,0,W*0.25,H*0.65,W*0.45);
    neb2.addColorStop(0,'rgba(20,60,80,0.14)');neb2.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=neb2;x.fillRect(0,0,W,H);

    // ดาวพื้นหลังกระพริบ
    for(const s of bgStars){
      const tw=s.a*(0.5+0.5*Math.sin(now*0.001*s.sp+s.p));
      x.beginPath();x.arc(s.x,s.y,s.r,0,6.28);x.fillStyle=`rgba(215,225,255,${tw})`;x.fill();
    }

    // เส้นทางแสง dashed
    x.save();x.strokeStyle=`rgba(243,201,122,${0.08+0.12*k})`;x.lineWidth=0.9;x.setLineDash([2,7]);
    x.beginPath();x.moveTo(ex,ey);x.lineTo(ex+(sx-ex)*k,ey+(sy-ey)*k);x.stroke();x.setLineDash([]);x.restore();

    // ดาวที่ผ่านมาแล้ว
    for(const p of passedPos){
      const lit=Math.max(0,Math.min(1,(k-p.t+0.06)/0.12));
      if(lit<=0)continue;
      const pg=x.createRadialGradient(p.x,p.y,0,p.x,p.y,14);
      pg.addColorStop(0,`rgba(255,240,190,${0.7*lit})`);pg.addColorStop(1,'rgba(255,220,150,0)');
      x.fillStyle=pg;x.beginPath();x.arc(p.x,p.y,14,0,6.28);x.fill();
      x.fillStyle=`rgba(255,252,230,${0.4+0.6*lit})`;x.beginPath();x.arc(p.x,p.y,1.6,0,6.28);x.fill();
    }

    // particles ไหลตามเส้นทาง
    for(const p of parts){
      const pos=(p.t+elapsed*p.sp)%1;
      if(pos>k)continue;
      const px=ex+(sx-ex)*pos,py=ey+(sy-ey)*pos;
      const ox=Math.cos(pathAngle+Math.PI/2)*p.off,oy=Math.sin(pathAngle+Math.PI/2)*p.off;
      const fade=Math.sin(pos*Math.PI)*p.a;
      x.beginPath();x.arc(px+ox,py+oy,p.sz,0,6.28);x.fillStyle=`rgba(255,210,100,${fade})`;x.fill();
    }

    // คลื่นแสง — หลายวง
    const wr=maxR*k;
    for(let ring=0;ring<4;ring++){
      const rr=wr-ring*9;if(rr<0)continue;
      const ra=(0.48-ring*0.11)*(1-e*0.65);
      x.strokeStyle=`rgba(255,210,90,${ra})`;x.lineWidth=Math.max(0.3,1.8-ring*0.4);
      x.beginPath();x.arc(ex,ey,rr,0,6.28);x.stroke();
    }
    // inner glow ที่หน้าคลื่น
    if(wr>8){
      const wg=x.createRadialGradient(ex,ey,wr-14,ex,ey,wr+8);
      wg.addColorStop(0,'rgba(255,200,80,0)');wg.addColorStop(0.5,`rgba(255,215,100,${0.07*(1-e*0.75)})`);wg.addColorStop(1,'rgba(255,200,80,0)');
      x.fillStyle=wg;x.fillRect(0,0,W,H);
    }

    // โลก — glow หลายชั้น
    const eG1=x.createRadialGradient(ex,ey,0,ex,ey,36);
    eG1.addColorStop(0,'rgba(80,180,255,0.85)');eG1.addColorStop(0.2,'rgba(60,150,255,0.30)');
    eG1.addColorStop(0.6,'rgba(40,110,220,0.08)');eG1.addColorStop(1,'rgba(30,80,200,0)');
    x.fillStyle=eG1;x.beginPath();x.arc(ex,ey,36,0,6.28);x.fill();
    x.fillStyle='#7ac5ff';x.beginPath();x.arc(ex,ey,5.5,0,6.28);x.fill();
    x.strokeStyle='rgba(200,235,255,0.5)';x.lineWidth=0.8;x.beginPath();x.arc(ex,ey,5.5,0,6.28);x.stroke();
    x.fillStyle='rgba(180,220,255,0.78)';x.font='10.5px "Space Grotesk",sans-serif';x.textAlign='left';
    x.fillText('โลก · '+(new Date().getFullYear()+543),ex+13,ey+4);

    // ดาวปลายทาง
    const reach=Math.max(0,Math.min(1,(k-0.78)/0.22));
    const pulse=0.72+0.28*Math.sin(now*0.0038);
    if(reach>0){
      // halo ใหญ่
      const sG1=x.createRadialGradient(sx,sy,0,sx,sy,72*reach);
      sG1.addColorStop(0,`rgba(255,225,120,${0.55*reach*pulse})`);
      sG1.addColorStop(0.35,`rgba(255,195,80,${0.18*reach})`);
      sG1.addColorStop(1,'rgba(255,160,40,0)');
      x.fillStyle=sG1;x.beginPath();x.arc(sx,sy,72*reach,0,6.28);x.fill();
      // glow กลาง
      const sG2=x.createRadialGradient(sx,sy,0,sx,sy,22);
      sG2.addColorStop(0,`rgba(255,248,225,${reach})`);
      sG2.addColorStop(0.5,`rgba(255,220,120,${0.45*reach})`);
      sG2.addColorStop(1,'rgba(255,170,60,0)');
      x.fillStyle=sG2;x.beginPath();x.arc(sx,sy,22,0,6.28);x.fill();
      // core
      x.fillStyle=`rgba(255,253,245,${0.65+0.35*reach})`;x.beginPath();x.arc(sx,sy,2.8+reach*2.2,0,6.28);x.fill();
      // cross spikes
      if(reach>0.25){
        const spLen=30*reach*pulse;
        x.strokeStyle=`rgba(255,245,200,${0.45*reach})`;x.lineWidth=0.7;
        [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
          x.beginPath();x.moveTo(sx,sy);x.lineTo(sx+dx*spLen,sy+dy*spLen);x.stroke();
        });
      }
      if(reach>0.15){
        x.fillStyle=`rgba(255,238,180,${reach})`;x.font=`500 ${11+reach*2}px "Space Grotesk",sans-serif`;x.textAlign='left';
        x.fillText('★ '+star.en,sx+14,sy-10);
        x.fillStyle=`rgba(243,215,140,${reach*0.72})`;x.font='300 10px "Space Grotesk",sans-serif';
        x.fillText(fmt(star.ly)+' ly',sx+14,sy+6);
      }
    }else{
      x.fillStyle='rgba(255,245,220,0.22)';x.beginPath();x.arc(sx,sy,2,0,6.28);x.fill();
    }
    echoRAF=requestAnimationFrame(frame);
  }
  echoRAF=requestAnimationFrame(frame);
}

// background sky
(function(){
  const c=document.getElementById('sky'),x=c.getContext('2d');let st=[],W,H;
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;st=[];const n=Math.round(W*H/10000);
    for(let i=0;i<n;i++)st.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random()*.5+.12,p:Math.random()*6.28});}
  rs();addEventListener('resize',rs);let t=0;
  (function loop(){t+=.016;x.clearRect(0,0,W,H);for(const s of st){const tw=s.a*(.6+.4*Math.sin(t*1.3+s.p));
    x.beginPath();x.arc(s.x,s.y,s.r,0,6.28);x.fillStyle='rgba(220,228,255,'+tw+')';x.fill();}requestAnimationFrame(loop);})();
})();

// controls
const dInput=document.getElementById('d');
const today=new Date();dInput.max=today.toISOString().slice(0,10);dInput.min='1900-01-01';
function run(){
  const v=dInput.value;const warn=document.getElementById('warn');
  if(!v){warn.textContent='เลือกวันก่อนนะ';return;}
  const d=new Date(v+'T00:00:00');
  if(isNaN(d)||d>new Date()){warn.textContent='เลือกวันที่ผ่านมาแล้ว';return;}
  warn.textContent='';
  history.replaceState(null,'','?d='+v);
  reveal(d);
}
document.getElementById('go').onclick=run;
dInput.addEventListener('keydown',e=>{if(e.key==='Enter')run();});
document.getElementById('again').onclick=()=>{document.getElementById('result').classList.remove('on');document.querySelector('.ask').scrollIntoView({behavior:'smooth'});dInput.focus();};
// ===== การ์ดแสงของคุณ — render รูปภาพสวย ๆ สำหรับแชร์ (พกแบรนด์+ลิงก์กลับมาเสมอ) =====
const SHARE_SITE='between-stars.vercel.app';
function wrapThai(x,text,maxW){const lines=[];let line='';
  for(const ch of text){const t=line+ch;
    if(x.measureText(t).width>maxW&&line){lines.push(line);line=ch;}else line=t;}
  if(line)lines.push(line);return lines;}
function buildLightCard(r){
  const W=1080,H=1350,c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
  const reached=r.ly>=STARS[0].ly;

  // พื้นหลัง — gradient เข้มจากบนลงล่าง
  x.fillStyle='#04060e';x.fillRect(0,0,W,H);
  const bgG=x.createLinearGradient(0,0,0,H);
  bgG.addColorStop(0,'#080c1a');bgG.addColorStop(0.5,'#04060d');bgG.addColorStop(1,'#02030a');
  x.fillStyle=bgG;x.fillRect(0,0,W,H);

  // nebula — สองจุด
  const neb1=x.createRadialGradient(W*0.55,H*0.22,0,W*0.55,H*0.22,W*0.7);
  neb1.addColorStop(0,'rgba(50,70,160,0.28)');neb1.addColorStop(0.5,'rgba(25,40,100,0.10)');neb1.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=neb1;x.fillRect(0,0,W,H);
  const neb2=x.createRadialGradient(W*0.2,H*0.75,0,W*0.2,H*0.75,W*0.5);
  neb2.addColorStop(0,'rgba(20,55,90,0.18)');neb2.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=neb2;x.fillRect(0,0,W,H);

  // ดาวพื้นหลัง — random seed คงที่ด้วย simple LCG
  let seed=42;const rng=()=>{seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/4294967296;};
  for(let i=0;i<420;i++){
    const sx=rng()*W,sy=rng()*H,sr=rng()*1.8+0.2,sa=rng()*0.55+0.1;
    x.beginPath();x.arc(sx,sy,sr,0,6.28);x.fillStyle=`rgba(215,225,255,${sa})`;x.fill();
  }
  // ดาวสว่างสุ่ม 8 ดวง
  for(let i=0;i<8;i++){
    const sx=rng()*W,sy=rng()*H,sr=rng()*1.2+1.0;
    x.beginPath();x.arc(sx,sy,sr,0,6.28);x.fillStyle='rgba(255,252,235,0.9)';x.fill();
  }

  // เส้นทางแสง — จากโลก (ล่างซ้าย) ไปดาว (กลาง บน)
  const ex=W*0.14,ey=H*0.76,fx=W*0.58,fy=H*0.24;
  x.save();x.strokeStyle='rgba(243,201,122,0.15)';x.lineWidth=1.5;x.setLineDash([3,9]);
  x.beginPath();x.moveTo(ex,ey);x.lineTo(fx,fy);x.stroke();x.setLineDash([]);x.restore();

  // โลก — small glowing blue dot
  const eH=x.createRadialGradient(ex,ey,0,ex,ey,40);
  eH.addColorStop(0,'rgba(80,175,255,0.85)');eH.addColorStop(0.3,'rgba(55,140,255,0.25)');eH.addColorStop(1,'rgba(30,80,220,0)');
  x.fillStyle=eH;x.beginPath();x.arc(ex,ey,40,0,6.28);x.fill();
  x.fillStyle='#7ac5ff';x.beginPath();x.arc(ex,ey,7,0,6.28);x.fill();
  x.fillStyle='rgba(180,220,255,0.65)';x.font='500 22px "Space Grotesk",sans-serif';x.textAlign='left';
  x.fillText('โลก',ex+16,ey+6);

  // ดาวปลายทาง — focal point ของภาพ
  const halo3=x.createRadialGradient(fx,fy,0,fx,fy,reached?280:120);
  if(reached){
    halo3.addColorStop(0,'rgba(255,248,220,1)');halo3.addColorStop(0.04,'rgba(255,228,140,0.75)');
    halo3.addColorStop(0.18,'rgba(243,201,80,0.30)');halo3.addColorStop(0.5,'rgba(243,170,40,0.08)');
    halo3.addColorStop(1,'rgba(200,130,20,0)');
  }else{
    halo3.addColorStop(0,'rgba(200,220,255,0.8)');halo3.addColorStop(0.15,'rgba(160,190,255,0.20)');
    halo3.addColorStop(1,'rgba(100,140,255,0)');
  }
  x.fillStyle=halo3;x.beginPath();x.arc(fx,fy,reached?280:120,0,6.28);x.fill();
  // star core
  x.fillStyle=reached?'#fff':'rgba(200,215,255,0.9)';x.beginPath();x.arc(fx,fy,reached?9:5,0,6.28);x.fill();
  // cross spikes สำหรับดาวที่ถึงแล้ว
  if(reached){
    [[0,-55],[0,55],[-55,0],[55,0],[-38,-38],[38,-38],[-38,38],[38,38]].forEach(([dx,dy],i)=>{
      const len=i<4?55:38,a=i<4?0.55:0.25;
      x.strokeStyle=`rgba(255,248,210,${a})`;x.lineWidth=i<4?1.2:0.7;
      x.beginPath();x.moveTo(fx,fy);x.lineTo(fx+dx,fy+dy);x.stroke();
    });
  }

  // gradient ข้อความด้านล่าง
  const textFade=x.createLinearGradient(0,H*0.52,0,H*0.62);
  textFade.addColorStop(0,'rgba(4,6,14,0)');textFade.addColorStop(1,'rgba(4,6,14,0.95)');
  x.fillStyle=textFade;x.fillRect(0,H*0.52,W,H*0.15);
  x.fillStyle='rgba(4,6,14,0.95)';x.fillRect(0,H*0.62,W,H*0.38);

  x.textAlign='center';

  // แบรนด์บน
  x.fillStyle='rgba(243,201,122,0.72)';x.font='600 20px "Space Grotesk",sans-serif';x.letterSpacing='0.25em';
  x.fillText('✦  BETWEEN STARS  ·  ห้วงดาว',W/2,78);x.letterSpacing='0';

  // separator บาง
  x.strokeStyle='rgba(243,201,122,0.20)';x.lineWidth=1;
  x.beginPath();x.moveTo(W/2-80,100);x.lineTo(W/2+80,100);x.stroke();

  // วันที่
  x.fillStyle='rgba(238,242,251,0.48)';x.font='300 28px "Noto Sans Thai",sans-serif';
  x.fillText('แสงจาก '+r.dateStr,W/2,H*0.635);

  // ชื่อดาว — ใหญ่
  x.fillStyle='#ffffff';x.font='300 72px "Noto Sans Thai",sans-serif';
  x.shadowColor='rgba(243,201,122,0.3)';x.shadowBlur=40;
  x.fillText(reached?r.star.th:'ยังอยู่ระหว่างทาง',W/2,H*0.635+90);
  x.shadowBlur=0;

  // en name + ระยะ
  x.fillStyle='rgba(243,201,122,0.88)';x.font='500 24px "Space Grotesk",sans-serif';x.letterSpacing='0.12em';
  x.fillText(reached?(r.star.en.toUpperCase()+' · '+fmt(r.star.ly)+' LY'):'STILL TRAVELING',W/2,H*0.635+148);x.letterSpacing='0';

  // เส้นคั่น
  x.strokeStyle='rgba(243,201,122,0.22)';x.lineWidth=1;
  x.beginPath();x.moveTo(W/2-120,H*0.635+178);x.lineTo(W/2+120,H*0.635+178);x.stroke();

  // คำบรรยาย
  x.fillStyle='rgba(238,242,251,0.65)';x.font='300 27px "Noto Sans Thai",sans-serif';
  const desc=reached?('คืนนี้แสงของคุณกำลังส่องถึง'+r.star.th+'พอดี — '+r.star.d)
    :'แสงจากวันนั้นยังเดินทางอยู่ในความมืดอันกว้างใหญ่ ไม่เคยหยุด';
  wrapThai(x,desc,W-220).forEach((ln,i)=>x.fillText(ln,W/2,H*0.635+224+i*42));

  // ระยะกิโลเมตร
  x.fillStyle='rgba(238,242,251,0.30)';x.font='300 20px "Space Grotesk",sans-serif';
  x.fillText('≈ '+fmt(r.ly*9.461)+' trillion km',W/2,H-148);

  // ลิงก์
  x.fillStyle='rgba(243,201,122,0.58)';x.font='500 19px "Space Grotesk",sans-serif';x.letterSpacing='0.06em';
  x.fillText(SHARE_SITE,W/2,H-100);x.letterSpacing='0';

  return c;
}
document.getElementById('share').onclick=async()=>{
  if(!lastResult)return;
  const b=document.getElementById('share'),orig=b.textContent;
  const txt='✦ แสงจากวันที่ '+lastResult.dateStr+' เดินทางมาแล้ว '+fmt(lastResult.ly)+' ปีแสง\n'+
    (lastResult.ly>=STARS[0].ly?('คืนนี้มันกำลังส่องถึงดาว '+lastResult.star.th+' ('+lastResult.star.en+')\n'):'แสงของคุณยังเดินทางอยู่ในความมืดระหว่างดวงดาว\n')+
    '— ลองหาปลายทางแสงของคุณที่ ห้วงดาว';
  try{
    b.textContent='✦ กำลังสร้างการ์ด...';
    try{await document.fonts.ready;}catch(e){}        // รอฟอนต์โหลดก่อนวาด ไม่งั้นได้ฟอนต์ fallback
    const canvas=buildLightCard(lastResult);
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
    const file=new File([blob],'light-echo.png',{type:'image/png'});
    b.textContent=orig;
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'แสงจากวันของคุณ · ห้วงดาว',text:txt});
    }else{ // เดสก์ท็อป/เบราว์เซอร์ที่แชร์ไฟล์ไม่ได้ → ดาวน์โหลดรูป + คัดลอกข้อความ
      const a=document.createElement('a');a.download='light-echo.png';a.href=URL.createObjectURL(blob);a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
      try{await navigator.clipboard.writeText(txt+'\n'+location.href);}catch(e){}
      b.textContent='✓ บันทึกรูปแล้ว';setTimeout(()=>b.textContent=orig,2200);
    }
  }catch(e){b.textContent=orig;}
};
