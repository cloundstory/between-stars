<style>

  {th:'ดาวอัลแทร์',en:'Altair',ly:16.7,d:'ดาวสว่างในกลุ่มนกอินทรี หมุนเร็วจนแบนเป็นวงรี'},
  {th:'เดลตา พาโวนิส',en:'Delta Pavonis',ly:19.9,d:'ดาวเหลืองอมส้ม คล้ายดวงอาทิตย์ในวัยชรากว่า'},
  {th:'ดาวเวกา',en:'Vega',ly:25.0,d:'ดาวสีน้ำเงินขาว เคยเป็นดาวเหนือเมื่อ 12,000 ปีก่อน'},
  {th:'ดาวโฟมัลฮอต',en:'Fomalhaut',ly:25.1,d:'ดาวเดียวดายแห่งฤดูใบไม้ร่วง ล้อมด้วยวงแหวนฝุ่น'},
  {th:'คารา',en:'Chara',ly:27.4,d:'ดาวเหลืองเงียบสงบในกลุ่มสุนัขล่าเนื้อ'},
  {th:'ดาวพอลลักซ์',en:'Pollux',ly:33.8,d:'ดาวยักษ์สีส้มในกลุ่มคนคู่ มีดาวเคราะห์โคจรรอบ'},

  {th:'ดาวเรกูลุส',en:'Regulus',ly:79,d:'หัวใจของสิงโต ดาวสีน้ำเงินขาวที่หมุนเร็วมาก'},

  {th:'ดาวมิซาร์',en:'Mizar',ly:83,d:'ดาวคู่ในหางหมีใหญ่ บททดสอบสายตาของคนโบราณ'},
  {th:'ดาวเมรัก',en:'Merak',ly:79.7,d:'หนึ่งในดาวชี้ทางสู่ดาวเหนือ ในกระบวยใหญ่'},

  {th:'ดาวอัลฟาร์ด',en:'Alphard',ly:177,d:'หัวใจอันโดดเดี่ยวของงูไฮดรา สีส้มอมแดง'},
  {th:'ดาวสไปกา',en:'Spica',ly:250,d:'รวงข้าวสีน้ำเงินของหญิงสาว แท้จริงเป็นดาวคู่ร้อนแรง'},
  {th:'ดาวโพลาริส',en:'Polaris',ly:433,d:'ดาวเหนือ เข็มทิศของนักเดินทางมานับพันปี'},
  {th:'ดาวแอนทาเรส',en:'Antares',ly:550,d:'หัวใจสีแดงก่ำของแมงป่อง ยักษ์ใหญ่ที่ใกล้สิ้นอายุ'},
  {th:'ดาวบีเทลจุส',en:'Betelgeuse',ly:642,d:'ยักษ์แดงบนไหล่นายพราน ที่สักวันจะระเบิดเป็นซูเปอร์โนวา'},
  {th:'ดาวไรเจล',en:'Rigel',ly:860,d:'แสงสีน้ำเงินขาวอันทรงพลังที่เท้าของนายพราน'},
  {th:'ดาวเดเนบ',en:'Deneb',ly:2615,d:'ดาวยักษ์ที่ส่องสว่างราวแสนดวงอาทิตย์ ในหางหงส์'}
];
STARS.sort((a,b)=>a.ly-b.ly);
const KMS={day:864e5};
function yearsSince(d){return (Date.now()-d.getTime())/(365.25*864e5);}
function pickStar(ly){
  let best=STARS[0],bd=1e9;
  for(const s of STARS){const diff=Math.abs(s.ly-ly);if(diff<bd){bd=diff;best=s;}}
  return best;
}
function fmt(n){return n.toLocaleString('th-TH',{maximumFractionDigits:1});}

let lastResult=null;
function reveal(d){
  const ly=yearsSince(d);
  const star=pickStar(ly);
  const idx=STARS.indexOf(star);
  const di=new Date(d);
  const dateStr=di.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('rdist').textContent='แสงเดินทางมาแล้ว '+fmt(ly)+' ปีแสง';
  const notReached=ly<STARS[0].ly;
  if(notReached){
    document.getElementById('rstar').innerHTML='<span class="g">✦</span>ยังอยู่ระหว่างทาง';
    document.getElementById('rstaren').textContent='แสงของคุณยังไม่ถึงดาวดวงใด';
    document.getElementById('rdesc').textContent='แสงจาก'+dateStr+' ยังเดินทางอยู่ในความมืดอันกว้างใหญ่ระหว่างดวงดาว ยังอ่อนเยาว์เกินกว่าจะถึงดาวดวงใด — แต่มันไม่เคยหยุด';
    document.getElementById('rnext').textContent='อีก '+fmt(STARS[0].ly-ly)+' ปี มันจะไปถึง '+STARS[0].th+' ('+STARS[0].en+') ดาวที่ใกล้ที่สุด';
  }else{
    document.getElementById('rstar').innerHTML='<span class="g">★</span>'+star.th;
    document.getElementById('rstaren').textContent=star.en+' · '+fmt(star.ly)+' light-years';
    document.getElementById('rdesc').textContent='ในค่ำคืนนี้ แสงจาก'+dateStr+' กำลังส่องถึง'+star.th+'พอดี — '+star.d;
    const next=STARS[idx+1];
    document.getElementById('rnext').textContent=next?('อีก '+fmt(next.ly-ly)+' ปี แสงของคุณจะไปถึง '+next.th):'';
  }
  document.getElementById('rmeta').textContent='จากวันนั้นถึงวันนี้ แสงเดินทาง ≈ '+fmt(ly*9.461)+' ล้านล้านกิโลเมตร';
  document.getElementById('result').classList.add('on');
  lastResult={dateStr,ly,star};
  animateEcho(star,ly);
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}),120);
}

// ภาพ: คลื่นแสงขยายจากโลก ไปถึงดาวเป้าหมาย
let echoRAF=null;
function animateEcho(star,ly){
  const c=document.getElementById('echo'),x=c.getContext('2d');
  function size(){const r=c.getBoundingClientRect();c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
  size();
  const W=c.getBoundingClientRect().width,H=c.getBoundingClientRect().height;
  const ex=W*0.16,ey=H*0.78; // ตำแหน่งโลก
  const sx=W*0.82,sy=H*0.26;  // ตำแหน่งดาวเป้าหมาย
  const maxR=Math.hypot(sx-ex,sy-ey);
  // background stars (คงที่)
  const bg=[];for(let i=0;i<90;i++)bg.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random()*.5+.12});
  const t0=performance.now();
  if(echoRAF)cancelAnimationFrame(echoRAF);
  function frame(now){
    const e=Math.min(1,(now-t0)/2600),k=1-Math.pow(1-e,3);
    x.clearRect(0,0,W,H);
    for(const s of bg){x.beginPath();x.arc(s.x,s.y,s.r,0,6.28);x.fillStyle='rgba(220,228,255,'+s.a+')';x.fill();}
    // เส้นทางแสง
    x.strokeStyle='rgba(243,201,122,.18)';x.lineWidth=1;x.setLineDash([2,5]);
    x.beginPath();x.moveTo(ex,ey);x.lineTo(ex+(sx-ex)*k,ey+(sy-ey)*k);x.stroke();x.setLineDash([]);
    // คลื่นแสงขยาย
    const wr=maxR*k;
    x.strokeStyle='rgba(243,201,122,'+(0.5*(1-e)+0.1)+')';x.lineWidth=1.4;
    x.beginPath();x.arc(ex,ey,wr,0,6.28);x.stroke();
    // โลก
    x.beginPath();x.arc(ex,ey,4,0,6.28);x.fillStyle='#6ab8ff';x.fill();
    x.fillStyle='rgba(180,210,255,.7)';x.font='10px "Space Grotesk",sans-serif';x.fillText('โลก · '+(new Date().getFullYear()+543),ex-6,ey+18);
    // ดาวเป้าหมาย — ค่อย ๆ สว่างเมื่อคลื่นไปถึง
    const reach=Math.max(0,Math.min(1,(k-0.82)/0.18));
    const tw=0.3+0.7*reach*(0.7+0.3*Math.sin(now*0.006));
    const g=x.createRadialGradient(sx,sy,0,sx,sy,16);g.addColorStop(0,'rgba(255,236,190,'+tw+')');g.addColorStop(1,'rgba(255,236,190,0)');
    x.fillStyle=g;x.beginPath();x.arc(sx,sy,16,0,6.28);x.fill();
    x.fillStyle='rgba(255,245,220,'+(0.4+0.6*reach)+')';x.beginPath();x.arc(sx,sy,2.4,0,6.28);x.fill();
    if(reach>0.05){x.fillStyle='rgba(255,236,190,'+reach+')';x.font='600 12px "Space Grotesk",sans-serif';x.fillText('★ '+star.en,sx-10,sy-16);}
    if(e<1||reach<1)echoRAF=requestAnimationFrame(frame);
  }
  echoRAF=requestAnimationFrame(frame);
}

// background sky
(function(){
  const c=document.getElementById('sky'),x=c.getContext('2d');let st=[],W,H;
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;st=[];const n=Math.round(W*H/10000);
    for(let i=0;i<n;i++)st.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random()*.5+.12,p:Math.random()*6.28});}
  rs();addEventListener('resize',rs);let t=0;
  (function loop(){t+=.016;x.clearRect(0,0,W,H);for(const s of st){const tw=s.a*(.6+.4*Math.sin(t*1.3+s.p));
    x.beginPath();x.arc(s.x,s.y,s.r,0,6.28);x.fillStyle='rgba(220,228,255,'+tw+')';x.fill();}requestAnimationFrame(loop);})();
})();

// controls
const dInput=document.getElementById('d');
const today=new Date();dInput.max=today.toISOString().slice(0,10);dInput.min='1900-01-01';
function run(){
  const v=dInput.value;const warn=document.getElementById('warn');
  if(!v){warn.textContent='เลือกวันก่อนนะ';return;}
  const d=new Date(v+'T00:00:00');
  if(isNaN(d)||d>new Date()){warn.textContent='เลือกวันที่ผ่านมาแล้ว';return;}
  warn.textContent='';
  history.replaceState(null,'','?d='+v);
  reveal(d);
}
document.getElementById('go').onclick=run;
dInput.addEventListener('keydown',e=>{if(e.key==='Enter')run();});
document.getElementById('again').onclick=()=>{document.getElementById('result').classList.remove('on');document.querySelector('.ask').scrollIntoView({behavior:'smooth'});dInput.focus();};
document.getElementById('share').onclick=async()=>{
  if(!lastResult)return;
  const txt='✦ แสงจากวันที่ '+lastResult.dateStr+' เดินทางมาแล้ว '+fmt(lastResult.ly)+' ปีแสง\nคืนนี้มันกำลังส่องถึงดาว '+lastResult.star.th+' ('+lastResult.star.en+')\n— ลองหาปลายทางแสงของคุณที่ ห้วงดาว';
  try{
    if(navigator.share){await navigator.share({title:'แสงจากวันของคุณ',text:txt,url:location.href});}
    else{await navigator.clipboard.writeText(txt+'\n'+location.href);const b=document.getElementById('share');const o=b.textContent;b.textContent='✓ คัดลอกแล้ว';setTimeout(()=>b.textContent=o,1800);}
  }catch(e){}
};
// เปิดจากลิงก์ที่มี ?d=
(function(){const m=new URLSearchParams(location.search).get('d');
  if(m&&/^\d{4}-\d{2}-\d{2}$/.test(m)){dInput.value=m;const d=new Date(m+'T00:00:00');if(!isNaN(d)&&d<=new Date())setTimeout(()=>reveal(d),400);}})();
</script>
